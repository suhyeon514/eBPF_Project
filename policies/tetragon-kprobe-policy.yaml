apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: tetragon-kprobe-monitor
spec:
  kprobes:
    # 📁 FILE: 파일 열기 (시스템콜 훅)
    - call: "sys_openat"
      syscall: true

    # 🌐 NETWORK: 네트워크 연결 (시스템콜 훅)
    - call: "sys_connect"
      syscall: true

    # 🔐 AUTH: 권한 상승 (얘는 내부 함수라 syscall: false 유지)
    - call: "commit_creds"
      syscall: false