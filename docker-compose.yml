version: "3.8"

services:
  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka
    restart: unless-stopped
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      # 도커 내부 통신용(29092)과 윈도우(FastAPI) 통신용(9092)을 분리합니다.
      - KAFKA_LISTENERS=PLAINTEXT://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - security-net
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:29092 || exit 1"]

  opensearch:
    image: opensearchproject/opensearch:2.12.0
    container_name: opensearch
    environment:
      - cluster.name=security-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=false
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OS_ADMIN_PASSWORD}
      - DISABLE_INSTALL_DEMO_CONFIG=true 
      - DISABLE_SECURITY_PLUGIN=true # 로컬은 보안 없이 편하게 개발
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - security-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 | grep -q 'lucene_version' || exit 1"]

  data-prepper:
    image: opensearchproject/data-prepper:2.14.0 # AWS와 버전 통일
    container_name: data-prepper
    volumes:
      - ./pipelines:/usr/share/data-prepper/pipelines:ro
    depends_on:
      kafka: { condition: service_healthy }
      opensearch: { condition: service_healthy }
    networks:
      - security-net

  postgresql:
    image: postgres:15.6-alpine
    container_name: postgresql
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=ebpf_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "6432:5432" # 윈도우 포트 충돌 방지용 유지
    networks:
      - security-net

  neo4j: # 로컬 개발을 위해 새로 추가된 부분
    image: neo4j:5.15.0
    container_name: neo4j
    ports:
      - "7474:7474" # 웹 접속용
      - "7687:7687" # Bolt 통신용
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
    volumes:
      - neo4j-data:/data
    networks:
      - security-net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-opensearch-datasource
      - GF_SECURITY_ALLOW_EMBEDDING=true       # 다른 사이트 삽입 허용
      - GF_AUTH_ANONYMOUS_ENABLED=true         # 로그인 없이 보기 허용 (개발용)
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer      # 익명 사용자 권한
    networks:
      - security-net
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana

networks:
  security-net:
    driver: bridge

volumes:
  opensearch-data:
  postgres-data:
  kafka-data:
  neo4j-data:
  grafana-data: