# ~/analysis-server/docker-compose.yml
services:
  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka
    restart: unless-stopped
    environment:
      - KAFKA_LOG_RETENTION_HOURS=168
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
      - KAFKA_HEAP_OPTS=-Xmx1G -Xms1G
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - security-net
    ports:
      - "9092:9092"

  opensearch:
    image: opensearchproject/opensearch:2.12.0
    container_name: opensearch
    restart: unless-stopped
    environment:
      - cluster.name=security-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OS_ADMIN_PASSWORD} # 변수 처리
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    networks:
      - security-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s -k -u admin:${OS_ADMIN_PASSWORD} https://localhost:9200 | grep -q 'lucene_version' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  data-prepper:
    image: opensearchproject/data-prepper:2.7.0
    container_name: data-prepper
    restart: unless-stopped
    volumes:
      - ./pipelines:/usr/share/data-prepper/pipelines:ro
    depends_on:
      opensearch: { condition: service_healthy }
    networks:
      - security-net

  postgresql:
    image: postgres:15.6-alpine
    container_name: postgresql
    restart: unless-stopped
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD} # 변수 처리
      - POSTGRES_DB=ebpf_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - security-net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD} # 변수 처리
    networks:
      - security-net
    ports:
      - "3000:3000"

networks:
  security-net:
    driver: bridge

volumes:
  opensearch-data:
  postgres-data:
  kafka-data: