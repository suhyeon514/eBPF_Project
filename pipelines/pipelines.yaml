version: "2"

# 1. Tetragon Process
tetragon-process-pipeline:
  source:
    kafka:
      bootstrap_servers: ["kafka:29092"]
      encryption: { type: "none" }
      topics: [{name: "tetragon.process", group_id: "edr-v8-process"}]
  processor:
    - parse_json: { source: "message" }
  sink:
    - opensearch:
        hosts: ["http://opensearch:9200"] # 로컬 보안 비활성화로 http 사용
        insecure: true
        index: "security-tetragon.process-%{yyyy.MM.dd}"

